[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  # Omit these keys from the security scan to prevent build failures
  SECRETS_SCAN_OMIT_KEYS = "JWT_SECRET,NUXT_DATABASE_URL"

[functions]
  node_bundler = "esbuild"

[[headers]]
  for = "/api/artworks/blob/*"
  [headers.values]
    cache-control = "public, max-age=31536000, immutable"